name: Build configurations

on:
  workflow_call:

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.targets.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Configure Nix experimental features
        run: |
          mkdir -p ~/.config/nix
          echo "extra-experimental-features = flakes nix-command pipe-operators" >> ~/.config/nix/nix.conf

      - name: Discover build targets
        id: targets
        run: |
          entries=()

          # Collect nixosConfigurations
          NIXOS=$(nix eval .#nixosConfigurations --apply 'builtins.attrNames' --json 2>/dev/null | jq -r '.[]' || true)
          for host in $NIXOS; do
            entries+=("{\"name\":\"nixos/$host\",\"attr\":\"nixosConfigurations.\\\"$host\\\".config.system.build.toplevel\"}")
          done

          # Collect darwinConfigurations
          DARWIN=$(nix eval .#darwinConfigurations --apply 'builtins.attrNames' --json 2>/dev/null | jq -r '.[]' || true)
          for host in $DARWIN; do
            entries+=("{\"name\":\"darwin/$host\",\"attr\":\"darwinConfigurations.\\\"$host\\\".system\"}")
          done

          # Collect homeConfigurations, but skip those that are subsets of NixOS configs
          HM_ALL=$(nix eval .#homeConfigurations --apply 'builtins.attrNames' --json 2>/dev/null | jq -r '.[]' || true)
          for hm in $HM_ALL; do
            HOSTNAME=$(echo "$hm" | cut -d'@' -f2)
            if echo " $NIXOS " | grep -q " $HOSTNAME "; then
              echo "Skipping home-manager/$hm (covered by nixos/$HOSTNAME)"
              continue
            fi
            entries+=("{\"name\":\"home-manager/$hm\",\"attr\":\"homeConfigurations.\\\"$hm\\\".activationPackage\"}")
          done

          if [ ${#entries[@]} -eq 0 ]; then
            echo "::error::No build targets discovered"
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          MATRIX=$(printf '%s\n' "${entries[@]}" | jq -sc '{include: .}')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

          echo ""
          echo "Discovered ${#entries[@]} build targets:"
          printf '%s\n' "${entries[@]}" | jq -r '.name'

  build:
    needs: discover
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    runs-on: ubuntu-latest
    name: build (${{ matrix.name }})
    steps:
      - name: Maximize build disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Configure Nix experimental features
        run: |
          mkdir -p ~/.config/nix
          echo "extra-experimental-features = flakes nix-command pipe-operators" >> ~/.config/nix/nix.conf

      - uses: cachix/cachix-action@master
        with:
          name: calops
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: true

      - name: Build ${{ matrix.name }}
        run: nix build ".#${{ matrix.attr }}" --no-link
