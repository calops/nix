name: Update flake inputs

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      changes: ${{ steps.diff.outputs.changes }}
      has-changes: ${{ steps.diff.outputs.has-changes }}
      matrix: ${{ steps.targets.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Configure Nix experimental features
        run: |
          mkdir -p ~/.config/nix
          echo "extra-experimental-features = flakes nix-command pipe-operators" >> ~/.config/nix/nix.conf

      - name: Save current lockfile
        run: cp flake.lock flake.lock.old

      - name: Update flake inputs
        run: nix flake update

      - name: Generate input change summary
        id: diff
        run: |
          if diff -q flake.lock.old flake.lock > /dev/null 2>&1; then
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
            echo "changes=No changes detected in flake inputs." >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          else
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
            {
              echo "changes<<EOF"
              git diff --no-color flake.lock.old flake.lock | \
                grep -E '^\+|^-' | \
                grep -E '(url|rev|narHash)' | \
                sed 's/^+/✅ /;s/^-/❌ /' || true
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "Changes detected in flake inputs."
          fi

      - name: Upload updated lockfile
        uses: actions/upload-artifact@v4
        with:
          name: lockfile
          path: flake.lock

      - name: Discover build targets
        id: targets
        run: |
          entries=()

          NIXOS=$(nix eval .#nixosConfigurations --apply 'builtins.attrNames' --json 2>/dev/null | jq -r '.[]' || true)
          for host in $NIXOS; do
            entries+=("{\"name\":\"nixos/$host\",\"attr\":\"nixosConfigurations.\\\"$host\\\".config.system.build.toplevel\"}")
          done

          DARWIN=$(nix eval .#darwinConfigurations --apply 'builtins.attrNames' --json 2>/dev/null | jq -r '.[]' || true)
          for host in $DARWIN; do
            entries+=("{\"name\":\"darwin/$host\",\"attr\":\"darwinConfigurations.\\\"$host\\\".system\"}")
          done

          HM_ALL=$(nix eval .#homeConfigurations --apply 'builtins.attrNames' --json 2>/dev/null | jq -r '.[]' || true)
          for hm in $HM_ALL; do
            HOSTNAME=$(echo "$hm" | cut -d'@' -f2)
            if echo " $NIXOS " | grep -q " $HOSTNAME "; then
              continue
            fi
            entries+=("{\"name\":\"home-manager/$hm\",\"attr\":\"homeConfigurations.\\\"$hm\\\".activationPackage\"}")
          done

          if [ ${#entries[@]} -eq 0 ]; then
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
          else
            MATRIX=$(printf '%s\n' "${entries[@]}" | jq -sc '{include: .}')
            echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare
    if: needs.prepare.outputs.has-changes == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    runs-on: ubuntu-latest
    name: build (${{ matrix.name }})
    steps:
      - name: Maximize build disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: actions/checkout@v4

      - name: Download updated lockfile
        uses: actions/download-artifact@v4
        with:
          name: lockfile
          path: .

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Configure Nix experimental features
        run: |
          mkdir -p ~/.config/nix
          echo "extra-experimental-features = flakes nix-command pipe-operators" >> ~/.config/nix/nix.conf

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - uses: cachix/cachix-action@master
        with:
          name: calops
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: true

      - name: Build ${{ matrix.name }}
        run: nix build ".#${{ matrix.attr }}" --no-link

  manage-pr:
    needs: [prepare, build]
    if: always() && needs.prepare.result == 'success'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CHANGES: ${{ needs.prepare.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download updated lockfile
        uses: actions/download-artifact@v4
        with:
          name: lockfile
          path: .

      - name: Check for existing PR
        id: check-pr
        run: |
          PR_DATA=$(gh pr list --head update-flake-inputs --state open --json number,isDraft,url --jq '.[0]' 2>/dev/null || echo "")
          if [ -n "$PR_DATA" ] && [ "$PR_DATA" != "null" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "number=$(echo "$PR_DATA" | jq -r '.number')" >> "$GITHUB_OUTPUT"
            echo "is-draft=$(echo "$PR_DATA" | jq -r '.isDraft')" >> "$GITHUB_OUTPUT"
            echo "url=$(echo "$PR_DATA" | jq -r '.url')" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Handle build success
        if: needs.build.result == 'success'
        run: |
          BRANCH="update-flake-inputs"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add flake.lock
          git commit -m "flake.lock: update all inputs" || true
          git push origin "$BRANCH" --force

          BODY="## Input changes
          $(echo "$CHANGES" | head -100)

          ---

          Built and cached successfully. Ready to merge."

          if [ "${{ steps.check-pr.outputs.exists }}" = "true" ]; then
            gh pr edit "$BRANCH" --body "$BODY"
            if [ "${{ steps.check-pr.outputs.is-draft }}" = "true" ]; then
              gh pr ready "$BRANCH"
            fi
            echo "Updated existing PR: ${{ steps.check-pr.outputs.url }}"
          else
            PR_URL=$(gh pr create \
              --head "$BRANCH" \
              --base main \
              --title "flake.lock: update all inputs" \
              --body "$BODY")
            echo "Created PR: $PR_URL"
          fi

      - name: Handle build failure (no existing ready PR)
        if: needs.build.result == 'failure' && steps.check-pr.outputs.exists != 'true'
        run: |
          BRANCH="update-flake-inputs"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add flake.lock
          git commit -m "flake.lock: update all inputs" || true
          git push origin "$BRANCH" --force

          BODY="## Input changes
          $(echo "$CHANGES" | head -100)

          ---

          ⚠️ **Build failed.** This PR is a draft.

          Failed CI run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          PR_URL=$(gh pr create \
            --head "$BRANCH" \
            --base main \
            --title "flake.lock: update all inputs (build failing)" \
            --body "$BODY" \
            --draft)
          echo "Created draft PR: $PR_URL"

      - name: Handle build failure (existing ready PR)
        if: needs.build.result == 'failure' && steps.check-pr.outputs.exists == 'true' && steps.check-pr.outputs.is-draft == 'false'
        run: |
          COMMENT="⚠️ **Scheduled update failed** — this PR was not updated to preserve its known-good state.

          Failed CI run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          $(echo "$CHANGES" | head -50)"

          gh pr comment "${{ steps.check-pr.outputs.number }}" --body "$COMMENT"
          echo "Commented on existing PR #${{ steps.check-pr.outputs.number }}"

      - name: Handle build failure (existing draft PR)
        if: needs.build.result == 'failure' && steps.check-pr.outputs.exists == 'true' && steps.check-pr.outputs.is-draft == 'true'
        run: |
          BRANCH="update-flake-inputs"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add flake.lock
          git commit -m "flake.lock: update all inputs" || true
          git push origin "$BRANCH" --force

          BODY="## Input changes
          $(echo "$CHANGES" | head -100)

          ---

          ⚠️ **Build failed.** This PR remains a draft.

          Failed CI run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          gh pr edit "${{ steps.check-pr.outputs.number }}" --body "$BODY"
          echo "Updated existing draft PR #${{ steps.check-pr.outputs.number }}"
